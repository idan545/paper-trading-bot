name: paper-trade

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run paper-trading pass
        run: python main.py run

      - name: Commit updated state
        run: |
          git config user.name  "paper-bot[bot]"
          git config user.email "paper-bot@users.noreply.github.com"
          git add -A portfolio_state.json equity_history.json webapp/dashboard.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update portfolio $(date -u +%Y-%m-%d) [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push attempt $i failed, retrying..."
              sleep 3
            done
          fi
